<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Squeeze Pagination Demo</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="demo-wrapper-ag">
    <div class="demo-card-ag">
      <h1>Squeeze Pagination</h1>
      <p class="demo-desc-ag">Hover or click the pagination items below to see the organic squeeze/squish motion effect.</p>
      
      <nav class="squeeze-pagination-container-ag" aria-label="Pagination">
        <button class="squeeze-btn-ag prev-next-btn-ag" aria-label="Previous page">
          &larr; Prev
        </button>
        
        <div class="squeeze-pages-ag">
          <button class="squeeze-btn-ag" aria-label="Page 1">1</button>
          <button class="squeeze-btn-ag active-page-ag" aria-current="page" aria-label="Page 2">2</button>
          <button class="squeeze-btn-ag" aria-label="Page 3">3</button>
          <button class="squeeze-btn-ag" aria-label="Page 4">4</button>
          <button class="squeeze-btn-ag" aria-label="Page 5">5</button>
        </div>

        <button class="squeeze-btn-ag prev-next-btn-ag" aria-label="Next page">
          Next &rarr;
        </button>
      </nav>
    </div>
  </div>
</body>
</html>
