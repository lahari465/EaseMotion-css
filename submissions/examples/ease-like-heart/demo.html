<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Like Heart · Particle Burst Effect</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>❤️ Like Heart</h2>
        <p class="sub">bursts into particles on click</p>

        <!-- === LIKE HEART === -->
        <div class="heart-container" id="heartContainer">
            <button class="heart-btn" id="heartBtn" aria-label="Like">
                <i class="fas fa-heart"></i>
                <span class="like-count" id="likeCount">0</span>
            </button>
        </div>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Click · watch the heart burst into particles
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const heartBtn = document.getElementById('heartBtn');
            const likeCount = document.getElementById('likeCount');
            const container = document.getElementById('heartContainer');
            let likes = 0;
            let isAnimating = false;

            // --- Create particle burst ---
            function createParticles(x, y) {
                const colors = ['#ff6b6b', '#ff4757', '#ff6348', '#ff2ed4', '#ff1493', '#ff6b81', '#ee5a24', '#f43f5e'];
                const particleCount = 40;

                for (let i = 0; i < particleCount; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';

                    const size = 6 + Math.random() * 10;
                    const color = colors[Math.floor(Math.random() * colors.length)];

                    const angle = Math.random() * 2 * Math.PI;
                    const velocity = 50 + Math.random() * 100;
                    const vx = Math.cos(angle) * velocity;
                    const vy = Math.sin(angle) * velocity - 30;

                    particle.style.width = size + 'px';
                    particle.style.height = size + 'px';
                    particle.style.background = color;
                    particle.style.left = x + 'px';
                    particle.style.top = y + 'px';
                    particle.style.setProperty('--vx', vx + 'px');
                    particle.style.setProperty('--vy', vy + 'px');

                    container.appendChild(particle);

                    // Remove particle after animation
                    setTimeout(() => {
                        particle.remove();
                    }, 1200);
                }
            }

            // --- Handle like ---
            function handleLike(e) {
                if (isAnimating) return;
                isAnimating = true;

                // Update like count
                likes++;
                likeCount.textContent = likes;

                // Get click position
                const rect = heartBtn.getBoundingClientRect();
                const x = rect.left + rect.width / 2;
                const y = rect.top + rect.height / 2;

                // Create particle burst
                createParticles(x, y);

                // Heart button animation
                heartBtn.classList.add('liked');
                setTimeout(() => {
                    heartBtn.classList.remove('liked');
                }, 600);

                // Scale animation
                heartBtn.classList.add('click-pulse');
                setTimeout(() => {
                    heartBtn.classList.remove('click-pulse');
                }, 300);

                console.log(`❤️ Liked! Total: ${likes}`);

                setTimeout(() => {
                    isAnimating = false;
                }, 400);
            }

            // --- Event Listeners ---
            heartBtn.addEventListener('click', handleLike);

            // Keyboard accessibility
            heartBtn.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    this.click();
                }
            });

            // --- Auto-like on load for demo ---
            setTimeout(() => {
                const rect = heartBtn.getBoundingClientRect();
                const x = rect.left + rect.width / 2;
                const y = rect.top + rect.height / 2;
                likes++;
                likeCount.textContent = likes;
                createParticles(x, y);
                heartBtn.classList.add('liked');
                setTimeout(() => {
                    heartBtn.classList.remove('liked');
                }, 600);
            }, 800);

            console.log('❤️ Like heart initialized!');

        })();
    </script>

</body>
</html>
