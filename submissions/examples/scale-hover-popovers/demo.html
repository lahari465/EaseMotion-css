<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scale Hover Popover</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Scale Hover Popover</h1>

  <div class="popover-wrapper">
    <button class="popover-btn">Hover Me</button>

    <div class="popover">
      <h3>Popover Title</h3>
      <p>
        This popover smoothly scales into view using only HTML and CSS.
      </p>
    </div>
  </div>
</div>

</body>
</html>
