<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Custom Cursor · Circle Follows Mouse</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- === CUSTOM CURSOR === -->
    <div class="cursor-dot" id="cursorDot"></div>
    <div class="cursor-ring" id="cursorRing"></div>

    <!-- === CONTENT === -->
    <div class="card">
        <h2>🎯 Custom Cursor</h2>
        <p class="sub">circle follows mouse</p>

        <div class="cursor-demo-area">
            <p>Move your mouse around</p>
            <div class="interactive-hint">
                <i class="fas fa-mouse-pointer"></i>
                <span>Hover over elements</span>
            </div>
            <div class="demo-buttons">
                <button class="demo-btn">Hover me</button>
                <button class="demo-btn">Click me</button>
                <button class="demo-btn">Hover & Click</button>
            </div>
        </div>

        <p style="margin-top: 1.5rem; font-size: 0.85rem; color: #64748b;">
            Smooth circle follows your cursor
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const dot = document.getElementById('cursorDot');
            const ring = document.getElementById('cursorRing');

            let mouseX = 0;
            let mouseY = 0;
            let ringX = 0;
            let ringY = 0;
            let dotX = 0;
            let dotY = 0;

            // --- Mouse move ---
            document.addEventListener('mousemove', function(e) {
                mouseX = e.clientX;
                mouseY = e.clientY;
                // Dot follows immediately
                dot.style.transform = `translate(${mouseX - 4}px, ${mouseY - 4}px)`;
            });

            // --- Ring smooth follow ---
            function animateRing() {
                ringX += (mouseX - ringX) * 0.15;
                ringY += (mouseY - ringY) * 0.15;
                ring.style.transform = `translate(${ringX - 20}px, ${ringY - 20}px)`;
                requestAnimationFrame(animateRing);
            }
            animateRing();

            // --- Hover effects on interactive elements ---
            const interactiveElements = document.querySelectorAll('a, button, .demo-btn, .interactive-hint');

            interactiveElements.forEach(el => {
                el.addEventListener('mouseenter', function() {
                    ring.classList.add('hover');
                    dot.classList.add('hover');
                });
                el.addEventListener('mouseleave', function() {
                    ring.classList.remove('hover');
                    dot.classList.remove('hover');
                });
            });

            // --- Click effect ---
            document.addEventListener('mousedown', function() {
                ring.classList.add('click');
                dot.classList.add('click');
                setTimeout(() => {
                    ring.classList.remove('click');
                    dot.classList.remove('click');
                }, 300);
            });

            // --- Hide cursor on touch devices ---
            if ('ontouchstart' in window) {
                dot.style.display = 'none';
                ring.style.display = 'none';
            }

            // --- Initial position ---
            setTimeout(() => {
                mouseX = window.innerWidth / 2;
                mouseY = window.innerHeight / 2;
                ringX = mouseX;
                ringY = mouseY;
                dot.style.transform = `translate(${mouseX - 4}px, ${mouseY - 4}px)`;
                ring.style.transform = `translate(${ringX - 20}px, ${ringY - 20}px)`;
            }, 100);

            console.log('🎯 Custom cursor initialized!');

        })();
    </script>

</body>
</html>
