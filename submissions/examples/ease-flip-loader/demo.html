<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flip Loader · Cards Flip Continuously</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>🃏 Flip Loader</h2>
        <p class="sub">cards flip continuously</p>

        <!-- === FLIP LOADER === -->
        <div class="flip-container" id="flipContainer">
            <div class="flip-card card-1">
                <div class="flip-inner">
                    <div class="flip-front">
                        <i class="fas fa-heart"></i>
                    </div>
                    <div class="flip-back">
                        <i class="fas fa-star"></i>
                    </div>
                </div>
            </div>
            <div class="flip-card card-2">
                <div class="flip-inner">
                    <div class="flip-front">
                        <i class="fas fa-diamond"></i>
                    </div>
                    <div class="flip-back">
                        <i class="fas fa-circle"></i>
                    </div>
                </div>
            </div>
            <div class="flip-card card-3">
                <div class="flip-inner">
                    <div class="flip-front">
                        <i class="fas fa-club"></i>
                    </div>
                    <div class="flip-back">
                        <i class="fas fa-square"></i>
                    </div>
                </div>
            </div>
        </div>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Cards flipping continuously · mesmerizing cycle
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const container = document.getElementById('flipContainer');

            // Click to restart animation
            container.addEventListener('click', function() {
                const cards = this.querySelectorAll('.flip-card');
                cards.forEach(card => {
                    card.style.animation = 'none';
                    void card.offsetWidth;
                    card.style.animation = '';
                });
                this.classList.add('click-pulse');
                setTimeout(() => {
                    this.classList.remove('click-pulse');
                }, 300);
                console.log('🃏 Flip loader restarted!');
            });

            // Keyboard accessibility
            container.setAttribute('tabindex', '0');
            container.setAttribute('role', 'button');
            container.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    this.click();
                }
            });

            console.log('🃏 Flip loader initialized!');

        })();
    </script>

</body>
</html>
