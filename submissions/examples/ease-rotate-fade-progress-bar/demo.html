<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Rotate-Fade Progress Bar — Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      align-items: center;
      justify-content: center;
      padding: 40px;
      background: #0a0c14;
    }
  </style>
</head>
<body>

  <div class="ease-progress-widget">
    <div class="ring-wrap" style="--circumference: 377; --fill-offset: 60.3;">
      <svg viewBox="0 0 140 140">
        <defs>
          <linearGradient id="ease-ring-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8" />
            <stop offset="100%" stop-color="#a78bfa" />
          </linearGradient>
        </defs>
        <circle class="ring-track" cx="70" cy="70" r="60"></circle>
        <circle class="ring-fill" cx="70" cy="70" r="60"></circle>
      </svg>
      <div class="ring-label">
        <span class="ring-percent">84%</span>
        <span class="ring-sublabel">Complete</span>
      </div>
    </div>
    <h3 class="widget-title">Storage Used</h3>
    <p class="widget-desc">42.1 GB of 50 GB</p>
  </div>

  <div class="ease-progress-widget">
    <div class="ring-wrap" style="--circumference: 377; --fill-offset: 226.2;">
      <svg viewBox="0 0 140 140">
        <defs>
          <linearGradient id="ease-ring-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8" />
            <stop offset="100%" stop-color="#a78bfa" />
          </linearGradient>
        </defs>
        <circle class="ring-track" cx="70" cy="70" r="60"></circle>
        <circle class="ring-fill" cx="70" cy="70" r="60"></circle>
      </svg>
      <div class="ring-label">
        <span class="ring-percent">40%</span>
        <span class="ring-sublabel">Complete</span>
      </div>
    </div>
    <h3 class="widget-title">Monthly Goal</h3>
    <p class="widget-desc">$1,200 of $3,000</p>
  </div>

</body>
</html>
