<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slider Thumb · Glow & Pulse Effect</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>🎚️ Slider Thumb</h2>
        <p class="sub">thumb has glow and pulse effect</p>

        <!-- === SLIDER THUMB === -->
        <div class="slider-container">
            <div class="slider-wrapper">
                <input type="range" class="slider" id="slider" min="0" max="100" value="50" />
                <div class="slider-value" id="sliderValue">50</div>
            </div>
        </div>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Drag the thumb · watch it glow and pulse
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const slider = document.getElementById('slider');
            const valueDisplay = document.getElementById('sliderValue');

            // --- Update value display ---
            function updateValue() {
                const val = slider.value;
                valueDisplay.textContent = val;
                valueDisplay.style.left = `calc(${(val / 100) * 100}% - ${valueDisplay.offsetWidth / 2}px)`;
            }

            // --- Event listeners ---
            slider.addEventListener('input', updateValue);

            // --- Click feedback ---
            slider.addEventListener('click', function() {
                this.classList.add('click-pulse');
                setTimeout(() => {
                    this.classList.remove('click-pulse');
                }, 300);
                console.log(`🎚️ Slider value: ${this.value}`);
            });

            // --- Keyboard accessibility ---
            slider.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    this.click();
                }
            });

            // --- Initial update ---
            setTimeout(updateValue, 50);

            // --- Reset to middle on double-click ---
            slider.addEventListener('dblclick', function() {
                this.value = 50;
                updateValue();
                this.classList.add('click-pulse');
                setTimeout(() => {
                    this.classList.remove('click-pulse');
                }, 300);
                console.log('🎚️ Slider reset to 50');
            });

            console.log('🎚️ Slider thumb initialized!');

        })();
    </script>

</body>
</html>
