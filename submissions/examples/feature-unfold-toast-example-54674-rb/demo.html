<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unfold Toast Demo (54674)</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="demo-wrapper-rb">
    <div class="demo-card-rb">
      <h1>Unfold Toast (Issue 54674)</h1>
      <p class="demo-desc-rb">Click the button below to trigger the 3D unfolding toast entrance animation.</p>
      
      <button id="trigger-toast-rb" class="action-btn-rb">Show Toast Notification</button>
      
      <!-- Toast Group container -->
      <div class="toast-area-rb">
        <div id="unfold-toast-rb" class="unfold-toast-rb hidden-toast-rb" role="alert">
          <div class="toast-content-rb">
            <span class="toast-icon-rb">🔔</span>
            <div class="toast-text-rb">
              <h4>System Notification</h4>
              <p>Your changes have been saved successfully.</p>
            </div>
          </div>
          <button id="close-toast-rb" class="close-btn-rb" aria-label="Dismiss toast">&times;</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const trigger = document.getElementById('trigger-toast-rb');
    const toast = document.getElementById('unfold-toast-rb');
    const close = document.getElementById('close-toast-rb');

    trigger.addEventListener('click', () => {
      toast.classList.remove('hidden-toast-rb');
      toast.classList.add('show-toast-rb');
    });

    close.addEventListener('click', () => {
      toast.classList.remove('show-toast-rb');
      toast.classList.add('hidden-toast-rb');
    });
  </script>
</body>
</html>
