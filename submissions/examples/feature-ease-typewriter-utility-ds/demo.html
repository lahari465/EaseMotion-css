<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Typewriter Utility</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container-ds">
    <h1
      class="ease-typewriter-ds"
      style="--ease-type-chars: 25;"
    >
      Welcome to EaseMotion CSS
    </h1>

    <p
      class="ease-typewriter-ds ease-typewriter--loop-ds"
      style="
        --ease-type-chars: 31;
        --ease-type-duration: 4s;
      "
    >
      Build beautiful animations easily.
    </p>

    <h2
      class="ease-typewriter-ds ease-typewriter--no-cursor-ds"
      style="--ease-type-chars: 20;"
    >
      CSS Only Utility
    </h2>
  </div>

</body>
</html>
