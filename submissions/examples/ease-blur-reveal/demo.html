<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blur Reveal · Blurred Text Sharpens</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>🌫️ Blur Reveal</h2>
        <p class="sub">blurred text sharpens on hover</p>

        <!-- === BLUR REVEAL === -->
        <div class="blur-container" id="blurContainer">
            <p class="blur-text" id="blurText">
                <span class="word" data-delay="0">Hover</span>
                <span class="word" data-delay="0.1">over</span>
                <span class="word" data-delay="0.2">this</span>
                <span class="word" data-delay="0.3">text</span>
                <span class="word" data-delay="0.4">to</span>
                <span class="word" data-delay="0.5">see</span>
                <span class="word" data-delay="0.6">the</span>
                <span class="word" data-delay="0.7">blur</span>
                <span class="word" data-delay="0.8">reveal</span>
                <span class="word" data-delay="0.9">effect</span>
                <span class="word" data-delay="1.0">in</span>
                <span class="word" data-delay="1.1">action!</span>
            </p>
        </div>

        <div class="blur-examples">
            <div class="example-item">
                <h3>✨ Magic Reveal</h3>
                <p>Hover to sharpen the text</p>
            </div>
            <div class="example-item">
                <h3>🎯 Focus Effect</h3>
                <p>Blurred becomes clear</p>
            </div>
            <div class="example-item">
                <h3>🌟 Dramatic Impact</h3>
                <p>Engaging visual effect</p>
            </div>
        </div>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Hover over the text · watch the blur disappear
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const container = document.getElementById('blurContainer');

            // Click feedback
            container.addEventListener('click', function() {
                this.classList.add('click-pulse');
                setTimeout(() => {
                    this.classList.remove('click-pulse');
                }, 300);
                console.log('🌫️ Blur reveal triggered!');
            });

            // Keyboard accessibility
            container.setAttribute('tabindex', '0');
            container.setAttribute('role', 'button');
            container.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    this.click();
                }
            });

            // --- Re-trigger animation on hover ---
            const words = document.querySelectorAll('.word');

            container.addEventListener('mouseenter', function() {
                words.forEach(word => {
                    word.style.animation = 'none';
                    void word.offsetWidth;
                    word.style.animation = '';
                });
            });

            console.log('🌫️ Blur reveal initialized!');

        })();
    </script>

</body>
</html>
