<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ease-zoom-in-progress-bar — EaseMotion CSS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="demo-stage">
    <h1 class="demo-title">ease-zoom-in-progress-bar</h1>
    <p class="demo-sub">Pure CSS progress bars — fill animates in on load, percentage label zooms in. Zero JavaScript.</p>

    <!-- ==== COMPONENT: drop this block into your project ==== -->
    <div class="ease-progress-zoom" style="--ease-progress-duration: 1.4s; --ease-progress-easing: cubic-bezier(0.22, 1, 0.36, 1); --ease-progress-zoom-scale: 1.4;">
      <div class="ease-progress-zoom__item" style="--ease-progress-value: 72%;">
        <div class="ease-progress-zoom__label">
          <span>Storage used</span>
          <span class="ease-progress-zoom__pct">72%</span>
        </div>
        <div class="ease-progress-zoom__track" role="progressbar" aria-valuenow="72" aria-valuemin="0" aria-valuemax="100" aria-label="Storage used">
          <div class="ease-progress-zoom__fill"></div>
        </div>
      </div>

      <div class="ease-progress-zoom__item" style="--ease-progress-value: 45%; animation-delay: 0.15s;">
        <div class="ease-progress-zoom__label">
          <span>Battery level</span>
          <span class="ease-progress-zoom__pct">45%</span>
        </div>
        <div class="ease-progress-zoom__track" role="progressbar" aria-valuenow="45" aria-valuemin="0" aria-valuemax="100" aria-label="Battery level">
          <div class="ease-progress-zoom__fill"></div>
        </div>
      </div>

      <div class="ease-progress-zoom__item" style="--ease-progress-value: 93%; animation-delay: 0.3s;">
        <div class="ease-progress-zoom__label">
          <span>Skill mastery</span>
          <span class="ease-progress-zoom__pct">93%</span>
        </div>
        <div class="ease-progress-zoom__track" role="progressbar" aria-valuenow="93" aria-valuemin="0" aria-valuemax="100" aria-label="Skill mastery">
          <div class="ease-progress-zoom__fill"></div>
        </div>
      </div>
    </div>
    <!-- ==== END COMPONENT ==== -->

  </main>

</body>
</html>
