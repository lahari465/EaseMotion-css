<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bouncing Balls · Sync Bounce</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>⚪ Bouncing Balls</h2>
        <p class="sub">three balls bounce in sync</p>

        <!-- === BOUNCING BALLS === -->
        <div class="bounce-container" id="bounceContainer">
            <div class="bounce-wrapper">
                <div class="ball ball-1"></div>
                <div class="ball ball-2"></div>
                <div class="ball ball-3"></div>
            </div>
        </div>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Three balls bouncing in perfect sync
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const container = document.getElementById('bounceContainer');

            // Click to restart animation
            container.addEventListener('click', function() {
                const balls = this.querySelectorAll('.ball');
                balls.forEach(ball => {
                    ball.style.animation = 'none';
                    void ball.offsetWidth;
                    ball.style.animation = '';
                });
                this.classList.add('click-pulse');
                setTimeout(() => {
                    this.classList.remove('click-pulse');
                }, 300);
                console.log('⚪ Bouncing balls restarted!');
            });

            // Keyboard accessibility
            container.setAttribute('tabindex', '0');
            container.setAttribute('role', 'button');
            container.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    this.click();
                }
            });

            console.log('⚪ Bouncing balls initialized!');

        })();
    </script>

</body>
</html>
