<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Progress Rings · Donut Fill Animation</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>🍩 Progress Rings</h2>
        <p class="sub">donut fills with animation</p>

        <!-- === PROGRESS RINGS === -->
        <div class="rings-container">
            <div class="ring-wrapper">
                <!-- Ring 1: 75% -->
                <div class="ring" data-progress="75">
                    <svg class="ring-svg" viewBox="0 0 120 120">
                        <circle class="ring-bg" cx="60" cy="60" r="52" />
                        <circle class="ring-fill" cx="60" cy="60" r="52" />
                    </svg>
                    <span class="ring-label">75%</span>
                    <span class="ring-text">Progress</span>
                </div>

                <!-- Ring 2: 45% -->
                <div class="ring" data-progress="45">
                    <svg class="ring-svg" viewBox="0 0 120 120">
                        <circle class="ring-bg" cx="60" cy="60" r="52" />
                        <circle class="ring-fill" cx="60" cy="60" r="52" />
                    </svg>
                    <span class="ring-label">45%</span>
                    <span class="ring-text">Loading</span>
                </div>

                <!-- Ring 3: 90% -->
                <div class="ring" data-progress="90">
                    <svg class="ring-svg" viewBox="0 0 120 120">
                        <circle class="ring-bg" cx="60" cy="60" r="52" />
                        <circle class="ring-fill" cx="60" cy="60" r="52" />
                    </svg>
                    <span class="ring-label">90%</span>
                    <span class="ring-text">Complete</span>
                </div>
            </div>
        </div>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Donut progress rings · animated fill
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const rings = document.querySelectorAll('.ring');

            rings.forEach(ring => {
                const progress = parseInt(ring.getAttribute('data-progress')) || 0;
                const fillCircle = ring.querySelector('.ring-fill');
                const label = ring.querySelector('.ring-label');

                // SVG circumference
                const radius = 52;
                const circumference = 2 * Math.PI * radius;

                // Set up the stroke
                fillCircle.style.strokeDasharray = circumference;
                fillCircle.style.strokeDashoffset = circumference;

                // Animate to progress
                const offset = circumference - (progress / 100) * circumference;

                // Trigger animation
                requestAnimationFrame(() => {
                    fillCircle.style.strokeDashoffset = offset;
                });

                // Click to restart animation
                ring.addEventListener('click', function() {
                    this.classList.add('click-pulse');
                    setTimeout(() => {
                        this.classList.remove('click-pulse');
                    }, 300);

                    // Reset and replay
                    fillCircle.style.transition = 'none';
                    fillCircle.style.strokeDashoffset = circumference;
                    void fillCircle.offsetWidth;
                    fillCircle.style.transition = 'stroke-dashoffset 1.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
                    fillCircle.style.strokeDashoffset = offset;

                    console.log(`🍩 Ring ${progress}% restarted!`);
                });

                // Keyboard accessibility
                ring.setAttribute('tabindex', '0');
                ring.setAttribute('role', 'button');
                ring.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        this.click();
                    }
                });
            });

            console.log('🍩 Progress rings initialized!');

        })();
    </script>

</body>
</html>
