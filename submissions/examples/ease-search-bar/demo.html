<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Bar · Expands with Focus</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>🔍 Search Bar</h2>
        <p class="sub">expands with focus</p>

        <!-- === SEARCH BAR === -->
        <div class="search-container">
            <div class="search-wrapper">
                <div class="search-icon">
                    <i class="fas fa-search"></i>
                </div>
                <input type="text" class="search-input" id="searchInput" placeholder="Search..." />
                <button class="search-clear" id="searchClear" aria-label="Clear search">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="search-suggestions" id="searchSuggestions">
                <div class="suggestion-item">Search tips...</div>
                <div class="suggestion-item">Recent searches</div>
                <div class="suggestion-item">Popular searches</div>
            </div>
        </div>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Click or tab · watch the search bar expand
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const searchInput = document.getElementById('searchInput');
            const searchWrapper = document.querySelector('.search-wrapper');
            const searchContainer = document.querySelector('.search-container');
            const clearBtn = document.getElementById('searchClear');
            const suggestions = document.getElementById('searchSuggestions');

            let isFocused = false;
            let isExpanded = false;

            // --- Expand search ---
            function expandSearch() {
                if (isExpanded) return;
                isExpanded = true;
                searchWrapper.classList.add('expanded');
                searchContainer.classList.add('expanded');
                console.log('🔍 Search expanded');
            }

            // --- Collapse search ---
            function collapseSearch() {
                if (!isExpanded) return;
                if (searchInput.value.length > 0) return;
                isExpanded = false;
                searchWrapper.classList.remove('expanded');
                searchContainer.classList.remove('expanded');
                suggestions.classList.remove('active');
                console.log('🔍 Search collapsed');
            }

            // --- Handle focus ---
            function handleFocus() {
                isFocused = true;
                expandSearch();
                suggestions.classList.add('active');
            }

            // --- Handle blur ---
            function handleBlur() {
                isFocused = false;
                setTimeout(() => {
                    if (!isFocused) {
                        suggestions.classList.remove('active');
                        collapseSearch();
                    }
                }, 200);
            }

            // --- Handle input ---
            function handleInput() {
                const value = this.value;
                if (value.length > 0) {
                    clearBtn.style.display = 'flex';
                    expandSearch();
                    // Update suggestions
                    const items = suggestions.querySelectorAll('.suggestion-item');
                    if (items.length > 0) {
                        items[0].textContent = `Search for "${value}"`;
                        items[1].textContent = `Showing results for: ${value}`;
                    }
                } else {
                    clearBtn.style.display = 'none';
                    // Reset suggestions
                    const items = suggestions.querySelectorAll('.suggestion-item');
                    if (items.length > 0) {
                        items[0].textContent = 'Search tips...';
                        items[1].textContent = 'Recent searches';
                        items[2].textContent = 'Popular searches';
                    }
                }
            }

            // --- Clear search ---
            function clearSearch() {
                searchInput.value = '';
                clearBtn.style.display = 'none';
                searchInput.focus();
                const items = suggestions.querySelectorAll('.suggestion-item');
                if (items.length > 0) {
                    items[0].textContent = 'Search tips...';
                    items[1].textContent = 'Recent searches';
                    items[2].textContent = 'Popular searches';
                }
                console.log('🔍 Search cleared');
            }

            // --- Handle keydown (Escape to clear) ---
            function handleKeydown(e) {
                if (e.key === 'Escape') {
                    if (searchInput.value.length > 0) {
                        clearSearch();
                    } else {
                        searchInput.blur();
                    }
                    e.preventDefault();
                }
                if (e.key === 'Enter') {
                    const value = searchInput.value.trim();
                    if (value) {
                        console.log(`🔍 Searching for: "${value}"`);
                        // Demo: Show alert
                        alert(`Searching for: "${value}"`);
                    }
                }
            }

            // --- Suggestion click ---
            document.querySelectorAll('.suggestion-item').forEach(item => {
                item.addEventListener('click', function() {
                    const text = this.textContent;
                    if (text && !text.includes('tips') && !text.includes('Recent') && !text.includes('Popular')) {
                        searchInput.value = text;
                        clearBtn.style.display = 'flex';
                        console.log(`🔍 Selected suggestion: "${text}"`);
                    }
                });
            });

            // --- Event Listeners ---
            searchInput.addEventListener('focus', handleFocus);
            searchInput.addEventListener('blur', handleBlur);
            searchInput.addEventListener('input', handleInput);
            searchInput.addEventListener('keydown', handleKeydown);
            clearBtn.addEventListener('click', clearSearch);

            // --- Keyboard accessibility ---
            searchInput.addEventListener('keydown', function(e) {
                if (e.key === 'Tab' && suggestions.classList.contains('active')) {
                    // Allow tab to navigate suggestions
                }
            });

            // --- Click outside to collapse ---
            document.addEventListener('click', function(e) {
                if (!searchContainer.contains(e.target)) {
                    if (searchInput.value.length === 0) {
                        collapseSearch();
                    }
                }
            });

            // --- Initial state ---
            clearBtn.style.display = 'none';

            console.log('🔍 Search bar initialized!');

        })();
    </script>

</body>
</html>
