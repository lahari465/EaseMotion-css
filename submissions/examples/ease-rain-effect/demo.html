<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rain Effect · Drops Fall on Canvas</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>🌧️ Rain Effect</h2>
        <p class="sub">drops fall on canvas</p>

        <!-- === RAIN EFFECT === -->
        <div class="rain-container">
            <canvas id="rainCanvas"></canvas>
            <div class="rain-overlay">
                <span class="rain-info" id="rainInfo">🌧️ 100 drops</span>
            </div>
        </div>

        <div class="rain-controls">
            <button class="rain-btn" id="toggleBtn">
                <i class="fas fa-pause"></i> Pause
            </button>
            <div class="rain-slider">
                <label>
                    <span>Drops:</span>
                    <input type="range" id="densitySlider" min="20" max="200" value="100" />
                    <span id="densityLabel">100</span>
                </label>
            </div>
            <button class="rain-btn" id="resetBtn">
                <i class="fas fa-undo"></i> Reset
            </button>
        </div>

        <p style="margin-top: 1.5rem; font-size: 0.85rem; color: #64748b;">
            Realistic raindrops falling on canvas
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const canvas = document.getElementById('rainCanvas');
            const ctx = canvas.getContext('2d');
            const densitySlider = document.getElementById('densitySlider');
            const densityLabel = document.getElementById('densityLabel');
            const toggleBtn = document.getElementById('toggleBtn');
            const resetBtn = document.getElementById('resetBtn');
            const rainInfo = document.getElementById('rainInfo');

            let drops = [];
            let isPaused = false;
            let animationId = null;
            let dropCount = 100;

            // --- Resize canvas ---
            function resizeCanvas() {
                const container = canvas.parentElement;
                const rect = container.getBoundingClientRect();
                canvas.width = rect.width || 600;
                canvas.height = rect.height || 400;
                initDrops();
            }

            // --- Create a drop ---
            function createDrop() {
                const speed = 4 + Math.random() * 8;
                return {
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    length: 10 + Math.random() * 20,
                    speed: speed,
                    opacity: 0.3 + Math.random() * 0.4,
                    width: 1 + Math.random() * 2,
                    wind: -0.5 + Math.random() * 1,
                };
            }

            // --- Initialize drops ---
            function initDrops() {
                drops = [];
                for (let i = 0; i < dropCount; i++) {
                    drops.push(createDrop());
                }
                rainInfo.textContent = `🌧️ ${drops.length} drops`;
            }

            // --- Draw a drop ---
            function drawDrop(drop) {
                ctx.beginPath();
                ctx.moveTo(drop.x, drop.y);
                ctx.lineTo(drop.x + drop.wind * drop.length * 0.3, drop.y + drop.length);
                ctx.strokeStyle = `rgba(174, 194, 224, ${drop.opacity})`;
                ctx.lineWidth = drop.width;
                ctx.lineCap = 'round';
                ctx.stroke();
            }

            // --- Update drop position ---
            function updateDrop(drop) {
                drop.y += drop.speed;
                drop.x += drop.wind * 0.5;

                // Reset to top if off screen
                if (drop.y > canvas.height) {
                    drop.y = -drop.length;
                    drop.x = Math.random() * canvas.width;
                    drop.speed = 4 + Math.random() * 8;
                    drop.length = 10 + Math.random() * 20;
                    drop.opacity = 0.3 + Math.random() * 0.4;
                    drop.wind = -0.5 + Math.random() * 1;
                }

                // Wrap horizontally
                if (drop.x < -10) drop.x = canvas.width + 10;
                if (drop.x > canvas.width + 10) drop.x = -10;
            }

            // --- Draw splash effect ---
            function drawSplash(x, y) {
                const splashCount = 6 + Math.floor(Math.random() * 6);
                for (let i = 0; i < splashCount; i++) {
                    const angle = Math.random() * 2 * Math.PI;
                    const distance = 3 + Math.random() * 8;
                    const size = 1 + Math.random() * 2;
                    ctx.beginPath();
                    ctx.arc(
                        x + Math.cos(angle) * distance,
                        y + Math.sin(angle) * distance * 0.3,
                        size, 0, Math.PI * 2
                    );
                    ctx.fillStyle = `rgba(174, 194, 224, ${0.1 + Math.random() * 0.2})`;
                    ctx.fill();
                }
            }

            // --- Render ---
            function render() {
                if (isPaused) return;

                // Clear canvas
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Draw dark background gradient
                const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                gradient.addColorStop(0, '#1a1a2e');
                gradient.addColorStop(0.5, '#16213e');
                gradient.addColorStop(1, '#0f3460');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Draw drops
                drops.forEach(drop => {
                    drawDrop(drop);

                    // Random splash on bottom
                    if (drop.y > canvas.height - 5 && Math.random() < 0.02) {
                        drawSplash(drop.x, canvas.height - 2);
                    }
                });

                // Update drops
                drops.forEach(drop => updateDrop(drop));

                // Add some mist effect
                ctx.fillStyle = `rgba(174, 194, 224, 0.01)`;
                ctx.fillRect(0, canvas.height - 20, canvas.width, 20);

                animationId = requestAnimationFrame(render);
            }

            // --- Start animation ---
            function startAnimation() {
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
                render();
                isPaused = false;
                toggleBtn.innerHTML = '<i class="fas fa-pause"></i> Pause';
            }

            // --- Pause animation ---
            function togglePause() {
                isPaused = !isPaused;
                if (isPaused) {
                    if (animationId) {
                        cancelAnimationFrame(animationId);
                        animationId = null;
                    }
                    toggleBtn.innerHTML = '<i class="fas fa-play"></i> Resume';
                } else {
                    toggleBtn.innerHTML = '<i class="fas fa-pause"></i> Pause';
                    render();
                }
            }

            // --- Reset drops ---
            function resetDrops() {
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
                initDrops();
                isPaused = false;
                toggleBtn.innerHTML = '<i class="fas fa-pause"></i> Pause';
                render();
            }

            // --- Update density ---
            function updateDensity() {
                const newCount = parseInt(densitySlider.value);
                densityLabel.textContent = newCount;
                dropCount = newCount;

                // Adjust drops to match new count
                while (drops.length < dropCount) {
                    drops.push(createDrop());
                }
                while (drops.length > dropCount) {
                    drops.pop();
                }
                rainInfo.textContent = `🌧️ ${drops.length} drops`;
            }

            // --- Event Listeners ---
            densitySlider.addEventListener('input', updateDensity);
            toggleBtn.addEventListener('click', togglePause);
            resetBtn.addEventListener('click', resetDrops);

            // --- Keyboard shortcuts ---
            document.addEventListener('keydown', function(e) {
                if (e.key === ' ' && e.target.tagName !== 'INPUT') {
                    e.preventDefault();
                    togglePause();
                }
                if (e.key === 'r' || e.key === 'R') {
                    resetDrops();
                }
            });

            // --- Resize ---
            window.addEventListener('resize', resizeCanvas);

            // --- Initial setup ---
            resizeCanvas();

            // --- Click feedback ---
            canvas.addEventListener('click', function() {
                this.classList.add('click-pulse');
                setTimeout(() => {
                    this.classList.remove('click-pulse');
                }, 300);
                // Create splash at click position
                const rect = this.getBoundingClientRect();
                const x = (event.clientX - rect.left) * (canvas.width / rect.width);
                const y = (event.clientY - rect.top) * (canvas.height / rect.height);
                for (let i = 0; i < 5; i++) {
                    drawSplash(x, y);
                }
                console.log('🌧️ Rain clicked!');
            });

            console.log('🌧️ Rain effect initialized!');

        })();
    </script>

</body>
</html>
