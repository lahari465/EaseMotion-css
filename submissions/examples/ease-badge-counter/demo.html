<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Badge Counter · Animated Number</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>🔢 Badge Counter</h2>
        <p class="sub">number animates up/down</p>

        <!-- === BADGE COUNTER === -->
        <div class="badge-container">
            <div class="badge-wrapper">
                <div class="badge" id="badge">
                    <span class="badge-number" id="badgeNumber">0</span>
                </div>
            </div>
            <div class="badge-controls">
                <button class="badge-btn decrement" id="decrementBtn" aria-label="Decrease">
                    <i class="fas fa-minus"></i>
                </button>
                <button class="badge-btn increment" id="incrementBtn" aria-label="Increase">
                    <i class="fas fa-plus"></i>
                </button>
                <button class="badge-btn reset" id="resetBtn" aria-label="Reset">
                    <i class="fas fa-undo"></i>
                </button>
            </div>
        </div>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Click buttons · watch the number animate
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const badgeNumber = document.getElementById('badgeNumber');
            const incrementBtn = document.getElementById('incrementBtn');
            const decrementBtn = document.getElementById('decrementBtn');
            const resetBtn = document.getElementById('resetBtn');
            const badge = document.getElementById('badge');

            let currentValue = 0;

            // --- Animate number change ---
            function animateNumber(newValue) {
                // Add animation class
                badgeNumber.classList.remove('animate-up', 'animate-down');
                void badgeNumber.offsetWidth; // Force reflow

                // Determine direction
                if (newValue > currentValue) {
                    badgeNumber.classList.add('animate-up');
                } else if (newValue < currentValue) {
                    badgeNumber.classList.add('animate-down');
                }

                // Update value
                currentValue = newValue;
                badgeNumber.textContent = currentValue;

                // Update badge background based on value
                if (currentValue === 0) {
                    badge.style.background = 'linear-gradient(135deg, #1a2f4f, #2c4a6e)';
                    badge.style.boxShadow = '0 4px 20px rgba(26, 47, 79, 0.3)';
                } else if (currentValue < 10) {
                    badge.style.background = 'linear-gradient(135deg, #4facfe, #00f2fe)';
                    badge.style.boxShadow = '0 4px 20px rgba(79, 172, 254, 0.3)';
                } else if (currentValue < 50) {
                    badge.style.background = 'linear-gradient(135deg, #43e97b, #10b981)';
                    badge.style.boxShadow = '0 4px 20px rgba(67, 233, 123, 0.3)';
                } else if (currentValue < 100) {
                    badge.style.background = 'linear-gradient(135deg, #fbc2eb, #ec4899)';
                    badge.style.boxShadow = '0 4px 20px rgba(251, 194, 235, 0.3)';
                } else {
                    badge.style.background = 'linear-gradient(135deg, #fa709a, #f43f5e)';
                    badge.style.boxShadow = '0 4px 20px rgba(250, 112, 154, 0.3)';
                }

                // Pulse effect on badge
                badge.classList.remove('badge-pulse');
                void badge.offsetWidth;
                badge.classList.add('badge-pulse');

                console.log(`🔢 Badge counter: ${currentValue}`);
            }

            // --- Increment ---
            function increment() {
                const newValue = currentValue + 1;
                animateNumber(newValue);
                incrementBtn.classList.add('click-pulse');
                setTimeout(() => incrementBtn.classList.remove('click-pulse'), 300);
            }

            // --- Decrement ---
            function decrement() {
                const newValue = Math.max(0, currentValue - 1);
                animateNumber(newValue);
                decrementBtn.classList.add('click-pulse');
                setTimeout(() => decrementBtn.classList.remove('click-pulse'), 300);
            }

            // --- Reset ---
            function reset() {
                animateNumber(0);
                resetBtn.classList.add('click-pulse');
                setTimeout(() => resetBtn.classList.remove('click-pulse'), 300);
            }

            // --- Event Listeners ---
            incrementBtn.addEventListener('click', increment);
            decrementBtn.addEventListener('click', decrement);
            resetBtn.addEventListener('click', reset);

            // Keyboard accessibility
            incrementBtn.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    increment();
                }
            });

            decrementBtn.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    decrement();
                }
            });

            resetBtn.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    reset();
                }
            });

            // Keyboard shortcuts
            document.addEventListener('keydown', function(e) {
                if (e.key === 'ArrowUp' || e.key === '=') {
                    e.preventDefault();
                    increment();
                } else if (e.key === 'ArrowDown' || e.key === '-') {
                    e.preventDefault();
                    decrement();
                } else if (e.key === 'r' || e.key === 'R') {
                    e.preventDefault();
                    reset();
                } else if (e.key === '0') {
                    e.preventDefault();
                    reset();
                }
            });

            // --- Initial animation on load ---
            setTimeout(() => {
                animateNumber(0);
            }, 300);

            console.log('🔢 Badge counter initialized!');

        })();
    </script>

</body>
</html>
