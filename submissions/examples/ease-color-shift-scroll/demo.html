<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Shift Scroll · Background Changes Color</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- === COLOR SHIFT SCROLL === -->
    <div class="color-shift-container" id="colorShiftContainer">
        
        <!-- Section 1 -->
        <section class="shift-section" data-color="#1a1a2e">
            <div class="shift-content">
                <div class="color-indicator" style="background: #1a1a2e;"></div>
                <h2>🌙 Midnight Blue</h2>
                <p>Scroll to shift colors</p>
                <span class="color-name">#1a1a2e</span>
                <div class="scroll-hint">↓ Scroll down ↓</div>
            </div>
        </section>

        <!-- Section 2 -->
        <section class="shift-section" data-color="#16213e">
            <div class="shift-content">
                <div class="color-indicator" style="background: #16213e;"></div>
                <h2>🌊 Deep Navy</h2>
                <p>Smooth transitions between colors</p>
                <span class="color-name">#16213e</span>
            </div>
        </section>

        <!-- Section 3 -->
        <section class="shift-section" data-color="#0f3460">
            <div class="shift-content">
                <div class="color-indicator" style="background: #0f3460;"></div>
                <h2>💎 Royal Blue</h2>
                <p>Background shifts with scroll</p>
                <span class="color-name">#0f3460</span>
            </div>
        </section>

        <!-- Section 4 -->
        <section class="shift-section" data-color="#533483">
            <div class="shift-content">
                <div class="color-indicator" style="background: #533483;"></div>
                <h2>🔮 Deep Purple</h2>
                <p>Endless color possibilities</p>
                <span class="color-name">#533483</span>
            </div>
        </section>

        <!-- Section 5 -->
        <section class="shift-section" data-color="#e94560">
            <div class="shift-content">
                <div class="color-indicator" style="background: #e94560;"></div>
                <h2>❤️ Vibrant Red</h2>
                <p>Scroll to the end</p>
                <span class="color-name">#e94560</span>
            </div>
        </section>

    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const container = document.getElementById('colorShiftContainer');
            const sections = document.querySelectorAll('.shift-section');
            const colors = [];

            // --- Extract colors from sections ---
            sections.forEach(section => {
                const color = section.getAttribute('data-color');
                if (color) colors.push(color);
            });

            // --- Update background color ---
            function updateBackground() {
                const scrollTop = window.scrollY;
                const windowHeight = window.innerHeight;
                const docHeight = document.documentElement.scrollHeight - windowHeight;
                const progress = docHeight > 0 ? scrollTop / docHeight : 0;

                // Calculate which two colors to interpolate between
                const totalSections = colors.length;
                const sectionProgress = progress * (totalSections - 1);
                const index = Math.floor(sectionProgress);
                const nextIndex = Math.min(index + 1, totalSections - 1);
                const t = sectionProgress - index;

                // Get the two colors
                const color1 = colors[index] || colors[0];
                const color2 = colors[nextIndex] || colors[colors.length - 1];

                // Interpolate between colors
                const interpolatedColor = lerpColor(color1, color2, t);
                document.body.style.backgroundColor = interpolatedColor;
                container.style.backgroundColor = interpolatedColor;

                // Update color name display
                const activeSection = sections[index];
                if (activeSection) {
                    const colorName = activeSection.querySelector('.color-name');
                    if (colorName) {
                        colorName.textContent = interpolatedColor;
                    }
                }

                // Update active sections
                sections.forEach((section, i) => {
                    section.classList.toggle('active', i === index || i === nextIndex);
                });
            }

            // --- Color interpolation helper ---
            function hexToRgb(hex) {
                const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                return result ? {
                    r: parseInt(result[1], 16),
                    g: parseInt(result[2], 16),
                    b: parseInt(result[3], 16)
                } : { r: 0, g: 0, b: 0 };
            }

            function rgbToHex(r, g, b) {
                return '#' + [r, g, b].map(c => Math.round(c).toString(16).padStart(2, '0')).join('');
            }

            function lerpColor(color1, color2, t) {
                const c1 = hexToRgb(color1);
                const c2 = hexToRgb(color2);
                const r = c1.r + (c2.r - c1.r) * t;
                const g = c1.g + (c2.g - c1.g) * t;
                const b = c1.b + (c2.b - c1.b) * t;
                return rgbToHex(r, g, b);
            }

            // --- Throttled scroll handler ---
            let ticking = false;

            function onScroll() {
                if (!ticking) {
                    window.requestAnimationFrame(function() {
                        updateBackground();
                        ticking = false;
                    });
                    ticking = true;
                }
            }

            // --- Resize handler ---
            function onResize() {
                updateBackground();
            }

            // --- Event Listeners ---
            window.addEventListener('scroll', onScroll);
            window.addEventListener('resize', onResize);

            // --- Initial update ---
            setTimeout(updateBackground, 100);

            // --- Click on color indicator for demo ---
            document.querySelectorAll('.color-indicator').forEach(indicator => {
                indicator.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const section = this.closest('.shift-section');
                    const color = section.getAttribute('data-color');
                    document.body.style.backgroundColor = color;
                    container.style.backgroundColor = color;
                    console.log(`🎨 Color shifted to: ${color}`);
                });
            });

            // Keyboard accessibility
            container.setAttribute('tabindex', '0');
            container.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    this.click();
                }
            });

            console.log('🎨 Color shift scroll initialized!');

        })();
    </script>

</body>
</html>
