<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wave Loader · Equalizer Bars</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>📊 Wave Loader</h2>
        <p class="sub">bars wave like an equalizer</p>

        <!-- === WAVE LOADER === -->
        <div class="wave-container" id="waveContainer">
            <div class="wave-bar bar-1"></div>
            <div class="wave-bar bar-2"></div>
            <div class="wave-bar bar-3"></div>
            <div class="wave-bar bar-4"></div>
            <div class="wave-bar bar-5"></div>
            <div class="wave-bar bar-6"></div>
            <div class="wave-bar bar-7"></div>
            <div class="wave-bar bar-8"></div>
            <div class="wave-bar bar-9"></div>
            <div class="wave-bar bar-10"></div>
        </div>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Equalizer bars · dynamic wave animation
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const container = document.getElementById('waveContainer');

            // Click to restart animation
            container.addEventListener('click', function() {
                const bars = this.querySelectorAll('.wave-bar');
                bars.forEach(bar => {
                    bar.style.animation = 'none';
                    void bar.offsetWidth;
                    bar.style.animation = '';
                });
                this.classList.add('click-pulse');
                setTimeout(() => {
                    this.classList.remove('click-pulse');
                }, 300);
                console.log('📊 Wave loader restarted!');
            });

            // Keyboard accessibility
            container.setAttribute('tabindex', '0');
            container.setAttribute('role', 'button');
            container.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    this.click();
                }
            });

            console.log('📊 Wave loader initialized!');

        })();
    </script>

</body>
</html>
