<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Float Banner Demo (54675)</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="demo-wrapper-rb">
    <!-- Float Banner element -->
    <div class="float-banner-rb" role="banner">
      <div class="banner-content-rb">
        <span class="banner-badge-rb">PROMO</span>
        <span class="banner-text-rb">Get 20% off all subscriptions this week only! Use code <strong>EASE20</strong></span>
      </div>
      <button class="banner-close-rb" aria-label="Dismiss banner">&times;</button>
    </div>

    <div class="demo-card-rb">
      <h1>Float Banner (Issue 54675)</h1>
      <p class="demo-desc-rb">Look at the banner floating at the top of the page. It bobs up and down smoothly to capture user attention.</p>
    </div>
  </div>

  <script>
    document.querySelector('.banner-close-rb').addEventListener('click', () => {
      document.querySelector('.float-banner-rb').style.display = 'none';
    });
  </script>
</body>
</html>
