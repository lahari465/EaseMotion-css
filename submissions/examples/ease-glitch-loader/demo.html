<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glitch Loader · Glitch Effect on Letters</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>📺 Glitch Loader</h2>
        <p class="sub">glitch effect on letters</p>

        <!-- === GLITCH LOADER === -->
        <div class="glitch-container" id="glitchContainer">
            <div class="glitch-text" data-text="LOADING">
                <span class="letter">L</span>
                <span class="letter">O</span>
                <span class="letter">A</span>
                <span class="letter">D</span>
                <span class="letter">I</span>
                <span class="letter">N</span>
                <span class="letter">G</span>
            </div>
            <span class="glitch-dots">
                <span>.</span>
                <span>.</span>
                <span>.</span>
            </span>
        </div>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Glitching letters · cyberpunk loading effect
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const container = document.getElementById('glitchContainer');

            // Click to restart animation
            container.addEventListener('click', function() {
                const letters = this.querySelectorAll('.letter');
                const dots = this.querySelectorAll('.glitch-dots span');
                letters.forEach(letter => {
                    letter.style.animation = 'none';
                    void letter.offsetWidth;
                    letter.style.animation = '';
                });
                dots.forEach(dot => {
                    dot.style.animation = 'none';
                    void dot.offsetWidth;
                    dot.style.animation = '';
                });
                this.classList.add('click-pulse');
                setTimeout(() => {
                    this.classList.remove('click-pulse');
                }, 300);
                console.log('📺 Glitch loader restarted!');
            });

            // Keyboard accessibility
            container.setAttribute('tabindex', '0');
            container.setAttribute('role', 'button');
            container.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    this.click();
                }
            });

            console.log('📺 Glitch loader initialized!');

        })();
    </script>

</body>
</html>
