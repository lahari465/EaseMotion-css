<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Typewriter Effect · Character by Character</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>⌨️ Typewriter Effect</h2>
        <p class="sub">types character by character</p>

        <!-- === TYPEWRITER EFFECT === -->
        <div class="typewriter-container">
            <div class="typewriter-wrapper">
                <div class="typewriter-text" id="typewriterText">
                    <span class="cursor">|</span>
                </div>
            </div>
            <div class="typewriter-controls">
                <button class="typewriter-btn" id="startBtn">
                    <i class="fas fa-play"></i> Start
                </button>
                <button class="typewriter-btn" id="pauseBtn">
                    <i class="fas fa-pause"></i> Pause
                </button>
                <button class="typewriter-btn" id="resetBtn">
                    <i class="fas fa-undo"></i> Reset
                </button>
            </div>
            <div class="typewriter-options">
                <label>
                    <span>Speed:</span>
                    <input type="range" id="speedSlider" min="10" max="200" value="80" />
                    <span id="speedLabel">80ms</span>
                </label>
            </div>
        </div>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Watch the text type itself · adjust the speed
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            // --- Configuration ---
            const textLines = [
                "Hello, world! 👋",
                "This is a typewriter effect.",
                "It types character by character.",
                "You can control the speed.",
                "✨ Made with ❤️ using CSS & JS"
            ];

            const container = document.getElementById('typewriterText');
            const startBtn = document.getElementById('startBtn');
            const pauseBtn = document.getElementById('pauseBtn');
            const resetBtn = document.getElementById('resetBtn');
            const speedSlider = document.getElementById('speedSlider');
            const speedLabel = document.getElementById('speedLabel');

            let currentLine = 0;
            let currentChar = 0;
            let isPaused = false;
            let isFinished = false;
            let timeoutId = null;
            let speed = 80;

            // --- Get cursor element ---
            function getCursor() {
                return container.querySelector('.cursor');
            }

            // --- Update speed label ---
            speedSlider.addEventListener('input', function() {
                speed = parseInt(this.value);
                speedLabel.textContent = speed + 'ms';
            });

            // --- Type next character ---
            function typeNextChar() {
                if (isPaused) return;

                const cursor = getCursor();
                const currentText = textLines[currentLine];

                if (currentChar < currentText.length) {
                    // Insert character before cursor
                    const char = currentText[currentChar];
                    const textNode = document.createTextNode(char);
                    container.insertBefore(textNode, cursor);
                    currentChar++;

                    // Random delay for realistic typing (70-130% of base speed)
                    const variation = 0.7 + Math.random() * 0.6;
                    const delay = speed * variation;

                    timeoutId = setTimeout(typeNextChar, delay);
                } else {
                    // Line complete - move to next line or finish
                    if (currentLine < textLines.length - 1) {
                        // Add line break
                        const br = document.createElement('br');
                        container.insertBefore(br, cursor);
                        currentLine++;
                        currentChar = 0;
                        timeoutId = setTimeout(typeNextChar, speed * 1.5);
                    } else {
                        // All lines complete
                        isFinished = true;
                        cursor.style.animation = 'blink 0.7s step-end infinite';
                        console.log('⌨️ Typewriter complete!');
                    }
                }
            }

            // --- Start typing ---
            function startTyping() {
                if (isFinished) {
                    resetTyping();
                }

                if (isPaused) {
                    isPaused = false;
                    pauseBtn.textContent = '⏸ Pause';
                    typeNextChar();
                    return;
                }

                if (currentChar > 0 || currentLine > 0) {
                    // Resume from current position
                    typeNextChar();
                    return;
                }

                // Start fresh
                startBtn.textContent = '⏳ Typing...';
                startBtn.disabled = true;
                isPaused = false;
                pauseBtn.textContent = '⏸ Pause';
                typeNextChar();
            }

            // --- Pause typing ---
            function pauseTyping() {
                if (isFinished || isPaused) return;
                isPaused = true;
                pauseBtn.textContent = '▶️ Resume';
                if (timeoutId) {
                    clearTimeout(timeoutId);
                    timeoutId = null;
                }
                console.log('⌨️ Typewriter paused');
            }

            // --- Reset typing ---
            function resetTyping() {
                if (timeoutId) {
                    clearTimeout(timeoutId);
                    timeoutId = null;
                }

                // Reset state
                currentLine = 0;
                currentChar = 0;
                isPaused = false;
                isFinished = false;

                // Clear text (keep cursor)
                const cursor = getCursor();
                container.innerHTML = '';
                container.appendChild(cursor);

                startBtn.textContent = '▶️ Start';
                startBtn.disabled = false;
                pauseBtn.textContent = '⏸ Pause';

                console.log('⌨️ Typewriter reset');
            }

            // --- Keyboard shortcuts ---
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    if (e.target.tagName === 'INPUT') return;
                    e.preventDefault();
                    if (isPaused) {
                        startTyping();
                    } else if (!isFinished) {
                        startTyping();
                    }
                }
                if (e.key === 'r' || e.key === 'R') {
                    resetTyping();
                }
                if (e.key === 'p' || e.key === 'P') {
                    pauseTyping();
                }
            });

            // --- Event Listeners ---
            startBtn.addEventListener('click', startTyping);
            pauseBtn.addEventListener('click', pauseTyping);
            resetBtn.addEventListener('click', resetTyping);

            // --- Initial setup ---
            const cursor = getCursor();
            cursor.style.animation = 'blink 0.7s step-end infinite';

            console.log('⌨️ Typewriter effect initialized!');

        })();
    </script>

</body>
</html>
