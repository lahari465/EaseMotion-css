<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ease-fade-in-progress-bar — EaseMotion CSS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="demo-stage">
    <h1 class="demo-title">ease-fade-in-progress-bar</h1>
    <p class="demo-sub">Pure CSS progress bars — track fades and slides in, fill sweeps in behind it. Zero JavaScript.</p>

    <!-- ==== COMPONENT: drop this block into your project ==== -->
    <div class="ease-progress-fade" style="--ease-progress-fade-duration: 0.9s; --ease-progress-fade-easing: ease-out; --ease-progress-fade-offset: 0.6rem;">
      <div class="ease-progress-fade__item" style="--ease-progress-fade-value: 64%;">
        <div class="ease-progress-fade__label">
          <span>Project completion</span>
          <span class="ease-progress-fade__pct">64%</span>
        </div>
        <div class="ease-progress-fade__track" role="progressbar" aria-valuenow="64" aria-valuemin="0" aria-valuemax="100" aria-label="Project completion">
          <div class="ease-progress-fade__fill"></div>
        </div>
      </div>

      <div class="ease-progress-fade__item" style="--ease-progress-fade-value: 38%; animation-delay: 0.12s;">
        <div class="ease-progress-fade__label">
          <span>Budget spent</span>
          <span class="ease-progress-fade__pct">38%</span>
        </div>
        <div class="ease-progress-fade__track" role="progressbar" aria-valuenow="38" aria-valuemin="0" aria-valuemax="100" aria-label="Budget spent">
          <div class="ease-progress-fade__fill"></div>
        </div>
      </div>

      <div class="ease-progress-fade__item" style="--ease-progress-fade-value: 87%; animation-delay: 0.24s;">
        <div class="ease-progress-fade__label">
          <span>Course progress</span>
          <span class="ease-progress-fade__pct">87%</span>
        </div>
        <div class="ease-progress-fade__track" role="progressbar" aria-valuenow="87" aria-valuemin="0" aria-valuemax="100" aria-label="Course progress">
          <div class="ease-progress-fade__fill"></div>
        </div>
      </div>
    </div>
    <!-- ==== END COMPONENT ==== -->

  </main>

</body>
</html>
