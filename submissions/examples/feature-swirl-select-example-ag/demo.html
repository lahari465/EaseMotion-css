<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swirl Select Exit Animation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="ease-swirl-demo-ag">

    <button
      class="ease-swirl-trigger-ag"
      id="toggleButton"
      aria-expanded="false"
      aria-controls="swirlMenu"
    >
      Choose Theme
      <span class="ease-arrow-ag">▼</span>
    </button>

    <div
      class="ease-swirl-menu-ag"
      id="swirlMenu"
      role="listbox"
    >
      <div class="ease-option-ag">🌙 Dark</div>
      <div class="ease-option-ag">☀️ Light</div>
      <div class="ease-option-ag">🌊 Ocean</div>
      <div class="ease-option-ag">🌲 Forest</div>
    </div>

  </div>

<script>
const button = document.getElementById("toggleButton");
const menu = document.getElementById("swirlMenu");

button.addEventListener("click", () => {
  const open = menu.classList.toggle("open");

  if (!open) {
    menu.classList.add("closing");

    menu.addEventListener(
      "animationend",
      () => {
        menu.classList.remove("closing");
      },
      { once: true }
    );
  }

  button.setAttribute("aria-expanded", open);
});

document.addEventListener("click", (event) => {
  if (!event.target.closest(".ease-swirl-demo-ag")) {
    if (menu.classList.contains("open")) {
      menu.classList.remove("open");
      menu.classList.add("closing");

      menu.addEventListener(
        "animationend",
        () => {
          menu.classList.remove("closing");
        },
        { once: true }
      );

      button.setAttribute("aria-expanded", "false");
    }
  }
});
</script>

</body>
</html>
