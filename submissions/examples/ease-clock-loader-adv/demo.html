<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clock Loader · Hand Spins Like Clock</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>🕐 Clock Loader</h2>
        <p class="sub">hand spins like a clock</p>

        <!-- === CLOCK LOADER === -->
        <div class="clock-container" id="clockContainer">
            <div class="clock-face">
                <!-- Hour markers -->
                <div class="marker marker-12"></div>
                <div class="marker marker-1"></div>
                <div class="marker marker-2"></div>
                <div class="marker marker-3"></div>
                <div class="marker marker-4"></div>
                <div class="marker marker-5"></div>
                <div class="marker marker-6"></div>
                <div class="marker marker-7"></div>
                <div class="marker marker-8"></div>
                <div class="marker marker-9"></div>
                <div class="marker marker-10"></div>
                <div class="marker marker-11"></div>

                <!-- Hour numbers -->
                <span class="hour-number num-12">12</span>
                <span class="hour-number num-3">3</span>
                <span class="hour-number num-6">6</span>
                <span class="hour-number num-9">9</span>

                <!-- Center dot -->
                <div class="center-dot"></div>

                <!-- Clock hand -->
                <div class="clock-hand"></div>
            </div>
        </div>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Hand spins like a clock · classic loading animation
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const container = document.getElementById('clockContainer');

            // Click to restart animation
            container.addEventListener('click', function() {
                const hand = this.querySelector('.clock-hand');
                hand.style.animation = 'none';
                void hand.offsetWidth;
                hand.style.animation = 'spin 2s linear infinite';
                this.classList.add('click-pulse');
                setTimeout(() => {
                    this.classList.remove('click-pulse');
                }, 300);
                console.log('🕐 Clock loader restarted!');
            });

            // Keyboard accessibility
            container.setAttribute('tabindex', '0');
            container.setAttribute('role', 'button');
            container.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    this.click();
                }
            });

            console.log('🕐 Clock loader initialized!');

        })();
    </script>

</body>
</html>
