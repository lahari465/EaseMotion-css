<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fade Grid · Squares Fade In/Out</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>🔲 Fade Grid</h2>
        <p class="sub">squares fade in/out in grid</p>

        <!-- === FADE GRID === -->
        <div class="grid-container" id="gridContainer">
            <div class="grid">
                <div class="cell cell-1"></div>
                <div class="cell cell-2"></div>
                <div class="cell cell-3"></div>
                <div class="cell cell-4"></div>
                <div class="cell cell-5"></div>
                <div class="cell cell-6"></div>
                <div class="cell cell-7"></div>
                <div class="cell cell-8"></div>
                <div class="cell cell-9"></div>
            </div>
        </div>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Squares fading in/out · mesmerizing grid pattern
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const container = document.getElementById('gridContainer');

            // Click to restart animation
            container.addEventListener('click', function() {
                const cells = this.querySelectorAll('.cell');
                cells.forEach(cell => {
                    cell.style.animation = 'none';
                    void cell.offsetWidth;
                    cell.style.animation = '';
                });
                this.classList.add('click-pulse');
                setTimeout(() => {
                    this.classList.remove('click-pulse');
                }, 300);
                console.log('🔲 Fade grid restarted!');
            });

            // Keyboard accessibility
            container.setAttribute('tabindex', '0');
            container.setAttribute('role', 'button');
            container.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    this.click();
                }
            });

            console.log('🔲 Fade grid initialized!');

        })();
    </script>

</body>
</html>
