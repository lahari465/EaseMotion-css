<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Bounce-Pulse Toast - EaseMotion Showcase</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="portfolio-container">
    <header class="portfolio-header">
      <h1>Creative Portfolio</h1>
      <p>Showcasing modern CSS animations</p>
    </header>

    <div class="showcase-area">
      <button class="trigger-btn" onclick="showToast()">Trigger Toast Notification</button>
    </div>

    <!-- The Toast Notification -->
    <div id="toast-container" class="toast-container">
      <div class="toast bounce-pulse-toast">
        <div class="toast-icon">✨</div>
        <div class="toast-content">
          <h4>Project Updated!</h4>
          <p>Your portfolio changes have been saved successfully.</p>
        </div>
        <button class="toast-close" onclick="hideToast()" aria-label="Close Toast">×</button>
      </div>
    </div>
  </div>

  <script>
    let toastTimeout;
    
    function showToast() {
      const container = document.getElementById('toast-container');
      
      // Reset if already showing
      clearTimeout(toastTimeout);
      
      container.classList.remove('hide');
      container.classList.add('show');
      
      // Auto-hide after 5 seconds
      toastTimeout = setTimeout(() => {
        hideToast();
      }, 5000);
    }

    function hideToast() {
      const container = document.getElementById('toast-container');
      if (container.classList.contains('show')) {
        container.classList.remove('show');
        container.classList.add('hide');
      }
    }
  </script>
</body>
</html>
