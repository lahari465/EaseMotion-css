<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Glass Card - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Google Fonts (Inter) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Local Component Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-center">
  
  <!-- Main Card Container with hover lift and fade-in entrance -->
  <div class="glass-card ease-hover-lift ease-fade-in ease-delay-100">
    
    <!-- Header with staggered slide-up -->
    <div class="glass-card__header ease-slide-up ease-delay-200">
      <div class="glass-card__avatar"></div>
      <div class="glass-card__title">
        <h3>Jane Doe</h3>
        <p>Frontend Developer</p>
      </div>
    </div>
    
    <!-- Body with staggered slide-up -->
    <div class="glass-card__body ease-slide-up ease-delay-300">
      <p>Building beautiful, animation-first user interfaces with zero dependencies and clean HTML.</p>
    </div>
    
    <!-- Footer with staggered slide-up and hover-grow buttons -->
    <div class="glass-card__footer ease-slide-up ease-delay-400">
      <button class="ease-btn ease-btn-primary ease-hover-grow">Follow</button>
      <button class="ease-btn ease-btn-secondary ease-hover-grow">Message</button>
    </div>
    
  </div>

</body>
</html>
