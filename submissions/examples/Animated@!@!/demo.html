<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Weather Widget - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS CDN -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
  />
  
  <!-- Custom Styles for this example -->
  <link rel="stylesheet" href="style.css" />
</head>
<body class="ease-min-h-screen ease-bg-gradient-to-br ease-from-slate-900 ease-via-indigo-950 ease-to-slate-900 ease-flex ease-items-center ease-justify-center ease-p-8 ease-font-sans">
  
  <main class="ease-w-full ease-max-w-5xl ease-fade-in">
    <div class="ease-text-center ease-mb-8">
      <h1 class="ease-text-4xl ease-font-bold ease-text-white ease-mb-2">Weather Widget</h1>
      <p class="ease-text-slate-400">Pure CSS animated weather conditions</p>
    </div>

    <!-- Weather Widget -->
    <div class="weather-widget">
      
      <!-- Main Weather Display -->
      <div class="weather-main">
        
        <!-- Weather Animation -->
        <div class="weather-animation weather-animation--sunny" id="weatherAnimation">
          <!-- Sun -->
          <div class="sun">
            <div class="sun__core"></div>
            <div class="sun__ray sun__ray--1"></div>
            <div class="sun__ray sun__ray--2"></div>
            <div class="sun__ray sun__ray--3"></div>
            <div class="sun__ray sun__ray--4"></div>
            <div class="sun__ray sun__ray--5"></div>
            <div class="sun__ray sun__ray--6"></div>
            <div class="sun__ray sun__ray--7"></div>
            <div class="sun__ray sun__ray--8"></div>
          </div>
          
          <!-- Clouds -->
          <div class="cloud cloud--1">
            <div class="cloud__part cloud__part--1"></div>
            <div class="cloud__part cloud__part--2"></div>
            <div class="cloud__part cloud__part--3"></div>
          </div>
          <div class="cloud cloud--2">
            <div class="cloud__part cloud__part--1"></div>
            <div class="cloud__part cloud__part--2"></div>
            <div class="cloud__part cloud__part--3"></div>
          </div>
          
          <!-- Rain -->
          <div class="rain">
            <div class="raindrop raindrop--1"></div>
            <div class="raindrop raindrop--2"></div>
            <div class="raindrop raindrop--3"></div>
            <div class="raindrop raindrop--4"></div>
            <div class="raindrop raindrop--5"></div>
            <div class="raindrop raindrop--6"></div>
            <div class="raindrop raindrop--7"></div>
            <div class="raindrop raindrop--8"></div>
            <div class="raindrop raindrop--9"></div>
            <div class="raindrop raindrop--10"></div>
          </div>
          
          <!-- Snow -->
          <div class="snow">
            <div class="snowflake snowflake--1"></div>
            <div class="snowflake snowflake--2"></div>
            <div class="snowflake snowflake--3"></div>
            <div class="snowflake snowflake--4"></div>
            <div class="snowflake snowflake--5"></div>
            <div class="snowflake snowflake--6"></div>
            <div class="snowflake snowflake--7"></div>
            <div class="snowflake snowflake--8"></div>
          </div>
          
          <!-- Lightning -->
          <div class="lightning">
            <svg class="lightning__bolt" viewBox="0 0 24 24" fill="currentColor">
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
            </svg>
          </div>
        </div>

        <!-- Weather Info -->
        <div class="weather-info">
          <div class="weather-info__location">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
              <circle cx="12" cy="10" r="3"></circle>
            </svg>
            <span id="locationName">San Francisco, CA</span>
          </div>
          
          <div class="weather-info__temp">
            <span class="weather-info__temp-value" id="tempValue">72</span>
            <span class="weather-info__temp-unit">°F</span>
          </div>
          
          <div class="weather-info__condition" id="conditionText">Sunny</div>
          
          <div class="weather-info__feels">
            Feels like <span id="feelsLike">75°</span>
          </div>
        </div>

      </div>

      <!-- Weather Details -->
      <div class="weather-details">
        <div class="weather-detail">
          <div class="weather-detail__icon">💧</div>
          <div class="weather-detail__info">
            <span class="weather-detail__label">Humidity</span>
            <span class="weather-detail__value" id="humidity">45%</span>
          </div>
        </div>
        <div class="weather-detail">
          <div class="weather-detail__icon">💨</div>
          <div class="weather-detail__info">
            <span class="weather-detail__label">Wind</span>
            <span class="weather-detail__value" id="wind">12 mph</span>
          </div>
        </div>
        <div class="weather-detail">
          <div class="weather-detail__icon">☀️</div>
          <div class="weather-detail__info">
            <span class="weather-detail__label">UV Index</span>
            <span class="weather-detail__value" id="uv">6</span>
          </div>
        </div>
        <div class="weather-detail">
          <div class="weather-detail__icon">👁️</div>
          <div class="weather-detail__info">
            <span class="weather-detail__label">Visibility</span>
            <span class="weather-detail__value" id="visibility">10 mi</span>
          </div>
        </div>
      </div>

      <!-- 5-Day Forecast -->
      <div class="weather-forecast">
        <h3 class="weather-forecast__title">5-Day Forecast</h3>
        <div class="weather-forecast__days">
          
          <div class="forecast-day" data-weather="sunny" data-temp="75">
            <span class="forecast-day__name">Mon</span>
            <div class="forecast-day__icon">☀️</div>
            <span class="forecast-day__temp">75°</span>
          </div>

          <div class="forecast-day" data-weather="cloudy" data-temp="68">
            <span class="forecast-day__name">Tue</span>
            <div class="forecast-day__icon">☁️</div>
            <span class="forecast-day__temp">68°</span>
          </div>

          <div class="forecast-day" data-weather="rainy" data-temp="62">
            <span class="forecast-day__name">Wed</span>
            <div class="forecast-day__icon">🌧️</div>
            <span class="forecast-day__temp">62°</span>
          </div>

          <div class="forecast-day" data-weather="stormy" data-temp="58">
            <span class="forecast-day__name">Thu</span>
            <div class="forecast-day__icon">⛈️</div>
            <span class="forecast-day__temp">58°</span>
          </div>

          <div class="forecast-day" data-weather="snowy" data-temp="32">
            <span class="forecast-day__name">Fri</span>
            <div class="forecast-day__icon">🌨️</div>
            <span class="forecast-day__temp">32°</span>
          </div>

        </div>
      </div>

      <!-- Weather Condition Selector -->
      <div class="weather-selector">
        <button class="selector-btn selector-btn--active" data-condition="sunny">☀️ Sunny</button>
        <button class="selector-btn" data-condition="cloudy">☁️ Cloudy</button>
        <button class="selector-btn" data-condition="rainy">🌧️ Rainy</button>
        <button class="selector-btn" data-condition="stormy">⛈️ Stormy</button>
        <button class="selector-btn" data-condition="snowy">🌨️ Snowy</button>
      </div>

    </div>
  </main>

  <script>
    // Weather Widget Functionality
    class WeatherWidget {
      constructor() {
        this.animation = document.getElementById('weatherAnimation');
        this.tempValue = document.getElementById('tempValue');
        this.conditionText = document.getElementById('conditionText');
        this.feelsLike = document.getElementById('feelsLike');
        this.humidity = document.getElementById('humidity');
        this.wind = document.getElementById('wind');
        this.uv = document.getElementById('uv');
        this.visibility = document.getElementById('visibility');
        this.locationName = document.getElementById('locationName');
        
        this.weatherData = {
          sunny: {
            temp: 72,
            feels: 75,
            condition: 'Sunny',
            humidity: '45%',
            wind: '12 mph',
            uv: '6',
            visibility: '10 mi'
          },
          cloudy: {
            temp: 65,
            feels: 63,
            condition: 'Cloudy',
            humidity: '60%',
            wind: '15 mph',
            uv: '3',
            visibility: '8 mi'
          },
          rainy: {
            temp: 58,
            feels: 55,
            condition: 'Rainy',
            humidity: '85%',
            wind: '20 mph',
            uv: '1',
            visibility: '5 mi'
          },
          stormy: {
            temp: 54,
            feels: 50,
            condition: 'Thunderstorm',
            humidity: '90%',
            wind: '35 mph',
            uv: '0',
            visibility: '2 mi'
          },
          snowy: {
            temp: 28,
            feels: 22,
            condition: 'Snowy',
            humidity: '75%',
            wind: '18 mph',
            uv: '2',
            visibility: '3 mi'
          }
        };
        
        this.init();
      }
      
      init() {
        // Selector buttons
        document.querySelectorAll('.selector-btn').forEach(btn => {
          btn.addEventListener('click', (e) => this.changeWeather(e));
        });
        
        // Forecast days
        document.querySelectorAll('.forecast-day').forEach(day => {
          day.addEventListener('click', (e) => this.selectForecastDay(e));
        });
      }
      
      changeWeather(e) {
        const condition = e.target.dataset.condition;
        
        // Update selector buttons
        document.querySelectorAll('.selector-btn').forEach(btn => {
          btn.classList.remove('selector-btn--active');
        });
        e.target.classList.add('selector-btn--active');
        
        // Update weather animation
        this.animation.className = `weather-animation weather-animation--${condition}`;
        
        // Update weather data
        const data = this.weatherData[condition];
        this.animateValue(this.tempValue, parseInt(this.tempValue.textContent), data.temp);
        this.conditionText.textContent = data.condition;
        this.feelsLike.textContent = `${data.feels}°`;
        this.humidity.textContent = data.humidity;
        this.wind.textContent = data.wind;
        this.uv.textContent = data.uv;
        this.visibility.textContent = data.visibility;
      }
      
      selectForecastDay(e) {
        const day = e.target.closest('.forecast-day');
        const weather = day.dataset.weather;
        const temp = day.dataset.temp;
        
        // Update main display
        this.animation.className = `weather-animation weather-animation--${weather}`;
        this.animateValue(this.tempValue, parseInt(this.tempValue.textContent), parseInt(temp));
        
        const data = this.weatherData[weather];
        this.conditionText.textContent = data.condition;
        this.feelsLike.textContent = `${data.feels}°`;
        
        // Update selector
        document.querySelectorAll('.selector-btn').forEach(btn => {
          btn.classList.remove('selector-btn--active');
          if (btn.dataset.condition === weather) {
            btn.classList.add('selector-btn--active');
          }
        });
      }
      
      animateValue(element, start, end) {
        const duration = 500;
        const steps = 30;
        const stepValue = (end - start) / steps;
        let current = start;
        let step = 0;
        
        const timer = setInterval(() => {
          step++;
          current += stepValue;
          
          if (step >= steps) {
            current = end;
            clearInterval(timer);
          }
          
          element.textContent = Math.round(current);
        }, duration / steps);
      }
    }
    
    // Initialize weather widget
    const weatherWidget = new WeatherWidget();
  </script>
</body>
</html>
