<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skeleton Loading UI - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Google Fonts (Inter) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- Local Component Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-center">

  <div class="skeleton-card ease-fade-in ease-delay-100">
    
    <!-- Skeleton Image Placeholder -->
    <div class="skeleton-card__image ease-pulse"></div>
    
    <!-- Skeleton Content -->
    <div class="skeleton-card__content">
      <!-- Category Tag -->
      <div class="skeleton skeleton--tag ease-pulse ease-delay-200"></div>
      
      <!-- Title Lines -->
      <div class="skeleton skeleton--title ease-pulse ease-delay-300"></div>
      <div class="skeleton skeleton--title skeleton--title-short ease-pulse ease-delay-300"></div>
      
      <!-- Description Lines -->
      <div class="skeleton skeleton--text ease-pulse ease-delay-400"></div>
      <div class="skeleton skeleton--text ease-pulse ease-delay-400"></div>
      <div class="skeleton skeleton--text skeleton--text-short ease-pulse ease-delay-400"></div>
      
      <!-- Footer / Author -->
      <div class="skeleton-card__footer ease-fade-in ease-delay-500">
        <div class="skeleton skeleton--avatar ease-pulse ease-delay-500"></div>
        <div class="skeleton-card__footer-text">
          <div class="skeleton skeleton--text skeleton--text-xs ease-pulse ease-delay-500"></div>
          <div class="skeleton skeleton--text skeleton--text-xs skeleton--text-short ease-pulse ease-delay-500"></div>
        </div>
      </div>
      
    </div>
  </div>

</body>
</html>
