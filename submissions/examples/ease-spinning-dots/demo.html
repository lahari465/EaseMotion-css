<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spinning Dots · Orbiting Dots</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>🔵 Spinning Dots</h2>
        <p class="sub">dots orbit in circle</p>

        <!-- === SPINNING DOTS === -->
        <div class="spinner-container" id="spinnerContainer">
            <div class="spinner">
                <div class="dot dot-1"></div>
                <div class="dot dot-2"></div>
                <div class="dot dot-3"></div>
                <div class="dot dot-4"></div>
                <div class="dot dot-5"></div>
                <div class="dot dot-6"></div>
                <div class="dot dot-7"></div>
                <div class="dot dot-8"></div>
                <div class="dot dot-9"></div>
                <div class="dot dot-10"></div>
                <div class="dot dot-11"></div>
                <div class="dot dot-12"></div>
            </div>
        </div>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Dots orbiting in a circle · loading animation
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const container = document.getElementById('spinnerContainer');

            // Click to restart animation
            container.addEventListener('click', function() {
                const dots = this.querySelectorAll('.dot');
                const spinner = this.querySelector('.spinner');

                // Restart animation
                spinner.style.animation = 'none';
                void spinner.offsetWidth;
                spinner.style.animation = 'spin 2s linear infinite';

                dots.forEach(dot => {
                    dot.style.animation = 'none';
                    void dot.offsetWidth;
                    dot.style.animation = 'dotPulse 1.5s ease-in-out infinite';
                });

                this.classList.add('click-pulse');
                setTimeout(() => {
                    this.classList.remove('click-pulse');
                }, 300);

                console.log('🔵 Spinning dots restarted!');
            });

            // Keyboard accessibility
            container.setAttribute('tabindex', '0');
            container.setAttribute('role', 'button');
            container.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    this.click();
                }
            });

            console.log('🔵 Spinning dots initialized!');

        })();
    </script>

</body>
</html>
